<!DOCTYPE html>
<html lang="es">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" crossorigin="anonymous">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulación de Mejora - SARES</title>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SARES">
<!--<link rel="apple-touch-icon" href="/static/images/logo.png">--> 
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
  --bg: #F2F1ED;                  /* fondo negro rojizo */
  --surface: #cfb2a0;            /* tarjeta rojo oscuro */
  --surface2: #6b1c1cab;           /* input rojo principal */

  --border: #b82222;             /* bordes fuertes */

  --accent: #fff0f0;             /* blanco rojizo */
  --accent-dim: rgba(255,240,240,0.12);
  --accent-glow: rgba(184,34,34,0.28);

  --text: #710014;               /* texto blanco */
  --text-muted: #3d0707;         /* rojo claro suave */

  --error: #ff1003;              /* rojo alerta */
  --warn: #ffffff;               /* blanco */
  --warn-dim: rgba(255,255,255,0.10);

  --success: #ffd6d6;            /* rosado claro */
  --info: #ffffff;               /* rojo pastel */
}

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(62,207,142,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(62,207,142,0.03) 0%, transparent 50%);
  }

  .wrapper {
    width: 100%;
    max-width: 680px;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    margin-bottom: 1rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(62,207,142,0.3);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    line-height: 1.2;
  }

  h1 span { color: var(--accent); }
  .subtitle { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.4rem; }

  .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

  .input-group {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }

  .field { flex: 1; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.03em;
  }

  input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ffffff;
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 600;
    padding: 0.65rem 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .btn {
    background: #351515d5;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 0.8rem 1.4rem;
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    letter-spacing: 0.02em;
  }

  .btn:hover { background: rgba(53, 21, 21, 0.95); transform: translateY(-1px) scale(1.03); box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Resultados */
  .results { display: none; }
  .results.visible { display: block; animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .stat.highlight {
    background: var(--surface2);
    border-color: var(--border);
  }

  .stat-label {
    font-size: 0.72rem;
    color: #f8e9e9;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: #ffffff;
  }

  .stat.highlight .stat-value { color: var(--accent); }

  .stat-sub {
    font-size: 0.75rem;
    color: #f8e9e9;
    margin-top: 0.2rem;
  }

  /* Alerta de riesgo */
  .alert {
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .alert.warn {
    background: var(--warn-dim);
    border: 1px solid rgba(227,179,65,0.3);
    color: var(--surface2);
  }

  .alert.ok {
    background: var(--accent-dim);
    border: 1px solid rgba(62,207,142,0.3);
    color: var(--surface2);
  }

  /* Gráfico */
  .chart-label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--surface2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
  }

  .chart-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    overflow: hidden;
    position: relative;
    height: 200px;
  }

  canvas { 
    display: block;
    max-width: 100%;
    height: auto;
  }

  .chart-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 0.4rem;
    font-size: 0.7rem;
    color: #f8e9e9;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
  <div class="badge" style="margin-bottom:0;">Módulo de Simulación</div>
  <a href="/" style="
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.8rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color 0.2s, border-color 0.2s;
  " onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'"
     onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">
    ← Inicio
  </a>
</div>
<h1>Proyección de <span>mejora académica</span></h1>
    <p class="subtitle">Ingresa tu nota del primer corte y el modelo calculará tu trayectoria estimada.</p>

    <div class="divider"></div>

    <div class="input-group">
      <div class="field">
        <label for="nota">Nota del primer corte (0.0 – 5.0)</label>
        <input type="number" id="nota" step="0.1" min="0" max="5" placeholder="3.5">
      </div>
      <button class="btn" id="btnSimular" onclick="simular()">Simular →</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="card">
      <div class="alert" id="alertBox"></div>

      <div class="stats-grid">
        <div class="stat">
          <div class="stat-label">Nota inicial</div>
          <div class="stat-value" id="statInicial">—</div>
          <div class="stat-sub">Primer corte</div>
        </div>
        <div class="stat highlight">
          <div class="stat-label">Nota estimada</div>
          <div class="stat-value" id="statFinal">—</div>
          <div class="stat-sub">Al final del semestre</div>
        </div>
        <div class="stat">
          <div class="stat-label">Actividades</div>
          <div class="stat-value" id="statIter">—</div>
          <div class="stat-sub">Recomendadas</div>
        </div>
      </div>
<div class="accesibilidad-bar" style="position: fixed; top: 80px; right: 15px; z-index: 9999; display: flex; gap: 5px;">
    <button type="button" onclick="cambiarTexto(2)" style="background: #470404; color: white; padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">A+</button>
    <button type="button" onclick="cambiarTexto(-2)" style="background: #470404; color: white; padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">A-</button>
</div>

<script src="{{ url_for('static', filename='js/accesibilidad.js') }}"></script>
      <div class="chart-label">Progresión estimada</div>
      <div class="chart-wrap">
        <canvas id="chartCanvas"></canvas>
        <div class="chart-axis">
          <span>Inicio</span>
          <span id="axisEnd">—</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function showError(msg) {
  let box = document.getElementById('errorBox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errorBox';
    box.style.cssText = 'margin-top:1rem;padding:0.75rem 1rem;border-radius:8px;background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.35);color:#f85149;font-size:0.875rem;';
    document.querySelector('.input-group').insertAdjacentElement('afterend', box);
  }
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
  document.getElementById('nota').style.borderColor = '#f85149';
  document.getElementById('nota').focus();
}

function clearError() {
  const box = document.getElementById('errorBox');
  if (box) box.style.display = 'none';
  document.getElementById('nota').style.borderColor = '';
}

function guardarSimulacion(data) {
  localStorage.setItem('ultimaSimulacion', JSON.stringify(data));
}

function obtenerSimulacionGuardada() {
  const guardada = localStorage.getItem('ultimaSimulacion');
  return guardada ? JSON.parse(guardada) : null;
}

function limpiarSimulacion() {
  localStorage.removeItem('ultimaSimulacion');
}

window.addEventListener('load', () => {
  const simulacionGuardada = obtenerSimulacionGuardada();
  if (simulacionGuardada) {
    document.getElementById('nota').value = simulacionGuardada.nota_inicial;
    mostrarResultados(simulacionGuardada);
  }
});

async function simular() {
  clearError();
  const nota = parseFloat(document.getElementById('nota').value);
  const btn = document.getElementById('btnSimular');

  if (isNaN(nota) || document.getElementById('nota').value === '') {
    showError('Por favor ingresa una nota válida.');
    return;
  }

  if (nota < 0 || nota > 5) {
    showError('La nota debe estar entre 0.0 y 5.0.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '…';

  try {
    const response = await fetch('/simular-mejora', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nota_corte1: nota })
    });

    const data = await response.json();
    guardarSimulacion(data);
    mostrarResultados(data);
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Simular →';
  }
}

function mostrarResultados(data) {
  document.getElementById('statInicial').textContent = data.nota_inicial.toFixed(1);
  document.getElementById('statFinal').textContent   = data.nota_final_estimada.toFixed(2);
  document.getElementById('statIter').textContent    = data.iteraciones;
  document.getElementById('axisEnd').textContent     = data.iteraciones + ' actividades';

  const alerta = document.getElementById('alertBox');
  if (data.nota_final_estimada >= 3.0) {
    alerta.className = 'alert ok';
    alerta.textContent = '✓ Con las actividades recomendadas, es posible superar la materia.';
  } else {
    alerta.className = 'alert warn';
    alerta.textContent = '⚠ La nota estimada sigue siendo de riesgo. Se recomienda apoyo adicional.';
  }

  dibujarGrafico(data.historial);

  const results = document.getElementById('results');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function dibujarGrafico(historial) {
  const canvas = document.getElementById('chartCanvas');
  const wrap = canvas.parentElement;
  const ctx = canvas.getContext('2d');

  // Esperar a que el DOM esté completamente renderizado
  setTimeout(() => {
    const dpr = window.devicePixelRatio || 1;
    
    // Obtener el ancho y alto reales del contenedor
    const containerWidth = wrap.offsetWidth;
    const containerHeight = wrap.offsetHeight;
    const W = Math.max(containerWidth - 40, 100);
    const H = Math.max(containerHeight - 40, 140);

    // Configurar resolución física
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    
    // Configurar tamaño visual
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    
    ctx.scale(dpr, dpr);

    // Márgenes
    const pad = { top: 16, right: 20, bottom: 24, left: 45 };
    const chartW = W - pad.left - pad.right;
    const chartH = H - pad.top - pad.bottom;

    const min = 0, max = 5;
    const n = historial.length || 1;

    const xOf = i => pad.left + (i / Math.max(n - 1, 1)) * chartW;
    const yOf = v => pad.top + chartH - ((v - min) / (max - min)) * chartH;

    // Limpiar
    ctx.fillStyle = 'var(--surface2)';
    ctx.fillRect(0, 0, W, H);

    // Líneas de referencia
    [1, 2, 3, 4, 5].forEach(v => {
      const y = yOf(v);
      ctx.beginPath();
      ctx.strokeStyle = v === 3 ? 'rgba(227,179,65,0.25)' : 'rgba(255,255,255,0.05)';
      ctx.lineWidth = v === 3 ? 1.5 : 0.8;
      ctx.setLineDash(v === 3 ? [4, 4] : []);
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.setLineDash([]);
      
      ctx.fillStyle = 'rgba(200,180,160,0.8)';
      ctx.font = 'bold 11px DM Sans, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(v.toFixed(0), pad.left - 8, y + 4);
    });

    if (historial.length > 0) {
      const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
      grad.addColorStop(0, 'rgba(62,207,142,0.3)');
      grad.addColorStop(1, 'rgba(62,207,142,0.05)');

      // Área
      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(historial[0]));
      for (let i = 1; i < n; i++) {
        ctx.lineTo(xOf(i), yOf(historial[i]));
      }
      ctx.lineTo(xOf(n - 1), H - pad.bottom);
      ctx.lineTo(xOf(0), H - pad.bottom);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Línea
      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(historial[0]));
      for (let i = 1; i < n; i++) {
        ctx.lineTo(xOf(i), yOf(historial[i]));
      }
      ctx.strokeStyle = '#3ecf8e';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      // Punto final
      const lx = xOf(n - 1), ly = yOf(historial[n - 1]);
      ctx.beginPath();
      ctx.arc(lx, ly, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#3ecf8e';
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(lx, ly, 11, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(62,207,142,0.25)';
      ctx.fill();
    }
  }, 0);
}
</script>
</body>
</html>
